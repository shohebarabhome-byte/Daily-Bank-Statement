name: Daily Bank Statement Processing

on:
  push:
    paths:
      - 'JAZIRA*.csv'  # Triggers when any JAZIRA CSV file is pushed
  schedule:
    - cron: '0 9 * * MON-FRI'  # Runs every weekday at 9 AM UTC
  workflow_dispatch:  # Allows manual trigger

jobs:
  process-bank-statements:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas
    
    - name: Process JAZIRA3001-JUN2026
      run: python scripts/process_bank_statement.py JAZIRA3001-JUN2026 "5_Al-Jazira Bank_Import File"
      continue-on-error: true
    
    - name: Process JAZIRA3002-JUN2026
      run: python scripts/process_bank_statement.py JAZIRA3002-JUN2026 "6_Al-Jazira Bank_Import File"
      continue-on-error: true
    
    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.csv
        git commit -m "Automated bank statement processing - $(date +%Y-%m-%d)" || echo "No changes to commit"
        git push
      continue-on-error: true
